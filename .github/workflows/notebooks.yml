name: notebooks

# Reproducibility check: execute every notebook top-to-bottom on a clean machine.
# Runs on each push/PR, monthly, and on demand - so the green badge is real evidence
# that the analyses still run as published.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 1 * *"   # 06:00 UTC on the 1st of every month
  workflow_dispatch:

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nbconvert ipykernel

      - name: Execute all notebooks
        run: |
          for nb in notebooks/*.ipynb; do
            echo "::group::$nb"
            jupyter nbconvert --to notebook --execute --stdout \
              --ExecutePreprocessor.timeout=600 "$nb" > /dev/null
            echo "::endgroup::"
          done
